[project]
site_name = "alphasignpy"
site_description = "Comprehensive Python library for Alpha Sign LED displays — full M-Protocol implementation."
site_author = "Lance Reinsmith"
copyright = """
Copyright &copy; 2026 Lance Reinsmith.
Original library by <a href="mailto:jason@prototux.net">prototux</a>.
"""

nav = [
    { "Home" = "index.md" },
    { "Getting Started" = "getting-started.md" },
    { "API Reference" = [
        { "Sign & Packet" = "api/sign.md" },
        { "Commands" = "api/commands.md" },
        { "Text Formatting" = "api/text-formatting.md" },
        { "Image" = "api/image.md" },
        { "Protocol Constants" = "api/protocol.md" },
        { "Exceptions" = "api/exceptions.md" },
    ]},
    { "Examples" = "examples.md" },
    { "Protocol Reference" = "protocol-reference.md" },
]

[project.theme]
language = "en"
features = [
    "announce.dismiss",
    "content.code.annotate",
    "content.code.copy",
    "content.code.select",
    "content.tooltips",
    "navigation.footer",
    "navigation.indexes",
    "navigation.instant",
    "navigation.instant.prefetch",
    "navigation.path",
    "navigation.sections",
    "navigation.top",
    "navigation.tracking",
    "search.highlight",
]

[[project.theme.palette]]
scheme = "default"
toggle.icon = "lucide/sun"
toggle.name = "Switch to dark mode"

[[project.theme.palette]]
scheme = "slate"
toggle.icon = "lucide/moon"
toggle.name = "Switch to light mode"
