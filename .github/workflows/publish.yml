name: Publish to PyPI

# Triggered by pushing a version tag (e.g. v1.2.3).
# The tag must match the version in pyproject.toml — the workflow enforces this.
on:
  push:
    tags:
      - "v[0-9]+.[0-9]+.[0-9]*"
  workflow_dispatch:

jobs:
  # ---------------------------------------------------------------------------
  # Run CI first — never publish a broken release
  # ---------------------------------------------------------------------------
  ci:
    name: CI gate
    uses: ./.github/workflows/ci.yml

  # ---------------------------------------------------------------------------
  # Build the distribution
  # ---------------------------------------------------------------------------
  build:
    name: Build distribution
    needs: ci
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Install build tools
        run: pip install build

      - name: Verify tag matches package version
        run: |
          PKG_VERSION=$(python -c "
          import tomllib, pathlib
          data = tomllib.loads(pathlib.Path('pyproject.toml').read_text())
          print(data['project']['version'])
          ")
          TAG_VERSION="${GITHUB_REF_NAME#v}"   # strip leading "v"
          if [ "$PKG_VERSION" != "$TAG_VERSION" ]; then
            echo "ERROR: pyproject.toml version ($PKG_VERSION) != tag ($TAG_VERSION)"
            exit 1
          fi
          echo "Version check passed: $PKG_VERSION"

      - name: Build sdist and wheel
        run: python -m build

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/
          if-no-files-found: error

  # ---------------------------------------------------------------------------
  # Publish to TestPyPI first (dry run)
  # ---------------------------------------------------------------------------
  publish-testpypi:
    name: Publish to TestPyPI
    needs: build
    runs-on: ubuntu-latest

    environment:
      name: testpypi
      url: https://test.pypi.org/p/alphasignpy

    permissions:
      id-token: write   # required for OIDC trusted publishing

    steps:
      - name: Download build artifacts
        uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist/

      - name: Publish to TestPyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          repository-url: https://test.pypi.org/legacy/

  # ---------------------------------------------------------------------------
  # Publish to PyPI (production)
  # ---------------------------------------------------------------------------
  publish-pypi:
    name: Publish to PyPI
    needs: publish-testpypi
    runs-on: ubuntu-latest

    environment:
      name: pypi
      url: https://pypi.org/p/alphasignpy

    permissions:
      id-token: write   # required for OIDC trusted publishing

    steps:
      - name: Download build artifacts
        uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist/

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1

  # ---------------------------------------------------------------------------
  # Create a GitHub Release with the built artifacts attached
  # ---------------------------------------------------------------------------
  github-release:
    name: Create GitHub Release
    needs: publish-pypi
    runs-on: ubuntu-latest

    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: Download build artifacts
        uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist/

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          files: dist/*
          generate_release_notes: true
