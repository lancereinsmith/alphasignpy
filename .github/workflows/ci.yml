name: CI

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]
  workflow_call:    # allow publish.yml to call this as a CI gate

jobs:
  # ---------------------------------------------------------------------------
  # Lint & format check
  # ---------------------------------------------------------------------------
  lint:
    name: Lint (ruff)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: astral-sh/setup-uv@v5

      - name: Check formatting
        run: uv run ruff format --check alphasign tests

      - name: Lint
        run: uv run ruff check alphasign tests

  # ---------------------------------------------------------------------------
  # Type checking
  # ---------------------------------------------------------------------------
  typecheck:
    name: Type check (ty)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: astral-sh/setup-uv@v5

      - name: Run ty
        run: uv run ty check alphasign

  # ---------------------------------------------------------------------------
  # Markdown linting
  # ---------------------------------------------------------------------------
  markdown:
    name: Markdown lint (rumdl)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: astral-sh/setup-uv@v5

      - name: Lint markdown
        run: uv run rumdl check docs/ README.md

  # ---------------------------------------------------------------------------
  # Tests — matrix across Python versions
  # ---------------------------------------------------------------------------
  test:
    name: Test (Python ${{ matrix.python-version }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11", "3.12", "3.13"]

    steps:
      - uses: actions/checkout@v4

      - uses: astral-sh/setup-uv@v5

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install package and test dependencies
        run: uv sync --group dev --python ${{ matrix.python-version }}

      - name: Run tests with coverage
        run: uv run pytest --cov=alphasign --cov-report=term-missing --cov-report=xml

      - name: Upload coverage to Codecov
        if: matrix.python-version == '3.13'
        uses: codecov/codecov-action@v4
        with:
          files: ./coverage.xml
          fail_ci_if_error: false
